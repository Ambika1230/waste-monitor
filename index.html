<!DOCTYPE html>
<html>
<head>
  <title>IoT Waste Monitoring Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card h2 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #94a3b8;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .full {
      color: #ef4444;
    }

    .ok {
      color: #22c55e;
    }

    .charts {
      margin-top: 30px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

  </style>
</head>

<body>

<header>
  🚮 IoT Waste Segregation & Monitoring Dashboard
</header>

<div class="container">

  <!-- Cards -->
  <div class="cards">
    <div class="card">
      <h2>Dry Waste Bin</h2>
      <div id="dry" class="value"></div>
    </div>

    <div class="card">
      <h2>E-Waste Bin</h2>
      <div id="ewaste" class="value"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <canvas id="dryChart"></canvas>
    <canvas id="ewasteChart"></canvas>
  </div>

</div>

<script>
let dryData = [];
let ewasteData = [];
let labels = [];

const dryChart = new Chart(document.getElementById("dryChart"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Dry Bin (%)",
      data: dryData,
      borderColor: "#3b82f6",
      tension: 0.4
    }]
  }
});

const ewasteChart = new Chart(document.getElementById("ewasteChart"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "E-Waste Bin (%)",
      data: ewasteData,
      borderColor: "#f97316",
      tension: 0.4
    }]
  }
});

async function getData() {
  let res = await fetch("https://api.thingspeak.com/channels/3339508/feeds/last.json");
  let data = await res.json();

  let dry = parseFloat(data.field1);
  let ewaste = parseFloat(data.field2);

  document.getElementById("dry").innerHTML =
    dry.toFixed(1) + "% " + (dry > 80 ? "<span class='full'>● FULL</span>" : "<span class='ok'>● OK</span>");

  document.getElementById("ewaste").innerHTML =
    ewaste.toFixed(1) + "% " + (ewaste > 80 ? "<span class='full'>● FULL</span>" : "<span class='ok'>● OK</span>");

  let time = new Date().toLocaleTimeString();

  labels.push(time);
  dryData.push(dry);
  ewasteData.push(ewaste);

  if (labels.length > 10) {
    labels.shift();
    dryData.shift();
    ewasteData.shift();
  }

  dryChart.update();
  ewasteChart.update();
}

setInterval(getData, 5000);
getData();
</script>

</body>
</html>
