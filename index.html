<!DOCTYPE html>
<html>
<head>
  <title>Smart Waste Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      width: 260px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    canvas {
      margin: 20px;
      background: white;
      border-radius: 10px;
    }

    .full { color: red; }
    .ok { color: lightgreen; }
  </style>
</head>

<body>

<h1>🚮 Smart Waste Monitoring Dashboard</h1>

<div class="container">
  <div class="card">
    <h2>Wet Bin</h2>
    <p id="wet"></p>
  </div>

  <div class="card">
    <h2>Dry Bin</h2>
    <p id="dry"></p>
  </div>

  <div class="card">
    <h2>Moisture</h2>
    <p id="moisture"></p>
  </div>
</div>

<h2>📊 Live Data Charts</h2>

<canvas id="wetChart" width="400" height="200"></canvas>
<canvas id="dryChart" width="400" height="200"></canvas>
<canvas id="moistChart" width="400" height="200"></canvas>

<script>
let wetData = [];
let dryData = [];
let moistData = [];
let labels = [];

const wetChart = new Chart(document.getElementById("wetChart"), {
  type: "line",
  data: { labels: labels, datasets: [{ label: "Wet Bin", data: wetData, borderColor: "red" }] }
});

const dryChart = new Chart(document.getElementById("dryChart"), {
  type: "line",
  data: { labels: labels, datasets: [{ label: "Dry Bin", data: dryData, borderColor: "blue" }] }
});

const moistChart = new Chart(document.getElementById("moistChart"), {
  type: "line",
  data: { labels: labels, datasets: [{ label: "Moisture", data: moistData, borderColor: "green" }] }
});

async function getData() {
  let res = await fetch("https://api.thingspeak.com/channels/3339508/feeds/last.json");
  let data = await res.json();

  let wet = parseFloat(data.field1);
  let dry = parseFloat(data.field2);
  let moisture = parseFloat(data.field3);

  // Update text
  document.getElementById("wet").innerHTML =
    wet + " cm " + (wet < 5 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>");

  document.getElementById("dry").innerHTML =
    dry + " cm " + (dry < 5 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>");

  document.getElementById("moisture").innerHTML =
    moisture + "% " + (moisture > 60 ? "<span class='full'>WET 💧</span>" : "<span class='ok'>DRY 🟡</span>");

  // Update charts
  let time = new Date().toLocaleTimeString();

  labels.push(time);
  wetData.push(wet);
  dryData.push(dry);
  moistData.push(moisture);

  if (labels.length > 10) {
    labels.shift();
    wetData.shift();
    dryData.shift();
    moistData.shift();
  }

  wetChart.update();
  dryChart.update();
  moistChart.update();
}

setInterval(getData, 5000);
getData();
</script>

</body>
</html>
