<!DOCTYPE html>
<html>
<head>
  <title>Smart Waste Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      width: 260px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    canvas {
      margin: 20px;
      background: white;
      border-radius: 10px;
    }

    .full { color: red; }
    .ok { color: lightgreen; }
  </style>
</head>

<body>

<h1>🚮 Smart Waste Monitoring Dashboard</h1>

<div class="container">
  <div class="card">
    <h2>Dry Waste Bin</h2>
    <p id="dry"></p>
  </div>

  <div class="card">
    <h2>E-Waste Bin</h2>
    <p id="ewaste"></p>
  </div>
</div>

<h2>📊 Live Data Charts</h2>

<canvas id="dryChart" width="400" height="200"></canvas>
<canvas id="ewasteChart" width="400" height="200"></canvas>

<script>
let dryData = [];
let ewasteData = [];
let labels = [];

const dryChart = new Chart(document.getElementById("dryChart"), {
  type: "line",
  data: { labels: labels, datasets: [{ label: "Dry Bin (%)", data: dryData, borderColor: "blue" }] }
});

const ewasteChart = new Chart(document.getElementById("ewasteChart"), {
  type: "line",
  data: { labels: labels, datasets: [{ label: "E-Waste Bin (%)", data: ewasteData, borderColor: "orange" }] }
});

async function getData() {
  let res = await fetch("https://api.thingspeak.com/channels/3339508/feeds/last.json");
  let data = await res.json();

  let dry = parseFloat(data.field1);
  let ewaste = parseFloat(data.field2);

  // Update text (percentage-based)
  document.getElementById("dry").innerHTML =
    dry.toFixed(1) + "% " + (dry > 80 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>");

  document.getElementById("ewaste").innerHTML =
    ewaste.toFixed(1) + "% " + (ewaste > 80 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>");

  // Update charts
  let time = new Date().toLocaleTimeString();

  labels.push(time);
  dryData.push(dry);
  ewasteData.push(ewaste);

  if (labels.length > 10) {
    labels.shift();
    dryData.shift();
    ewasteData.shift();
  }

  dryChart.update();
  ewasteChart.update();
}

setInterval(getData, 5000);
getData();
</script>

</body>
</html>
