<!DOCTYPE html>
<html>
<head>
  <title>Smart Waste Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      width: 260px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .value {
      font-size: 30px;
      margin: 10px 0;
    }

    .status {
      font-size: 18px;
      font-weight: bold;
    }

    .full {
      color: #ff4d4d;
    }

    .ok {
      color: #00ffcc;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h1>🚮 Smart Waste Monitoring System</h1>

<div class="container">

  <div class="card">
    <h2>Wet Bin</h2>
    <div id="wetVal" class="value">--</div>
    <div id="wetStatus" class="status"></div>
  </div>

  <div class="card">
    <h2>Dry Bin</h2>
    <div id="dryVal" class="value">--</div>
    <div id="dryStatus" class="status"></div>
  </div>

  <div class="card">
    <h2>Moisture</h2>
    <div id="moistVal" class="value">--</div>
    <div id="moistStatus" class="status"></div>
  </div>

</div>

<footer>
  Live Data from ThingSpeak | Updated every 5 sec
</footer>

<script>
async function getData() {
  let res = await fetch("https://api.thingspeak.com/channels/3339508/feeds/last.json");
  let data = await res.json();

  let wet = parseFloat(data.field1);
  let dry = parseFloat(data.field2);
  let moisture = parseFloat(data.field3);

  // Wet bin
  document.getElementById("wetVal").innerText = wet + " cm";
  document.getElementById("wetStatus").innerHTML =
    wet < 5 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>";

  // Dry bin
  document.getElementById("dryVal").innerText = dry + " cm";
  document.getElementById("dryStatus").innerHTML =
    dry < 5 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>";

  // Moisture
  document.getElementById("moistVal").innerText = moisture + "%";
  document.getElementById("moistStatus").innerHTML =
    moisture > 60 ? "<span class='full'>WET 💧</span>" : "<span class='ok'>DRY 🟡</span>";
}

setInterval(getData, 5000);
getData();
</script>

</body>
</html>
