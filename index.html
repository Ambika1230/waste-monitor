<!DOCTYPE html>
<html>
<head>
  <title>Smart Waste Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      width: 260px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    iframe {
      border-radius: 10px;
      margin: 10px;
    }

    .full { color: red; }
    .ok { color: lightgreen; }
  </style>
</head>

<body>

<h1>🚮 Smart Waste Monitoring System</h1>

<div class="container">

  <div class="card">
    <h2>Wet Bin</h2>
    <p id="wet"></p>
  </div>

  <div class="card">
    <h2>Dry Bin</h2>
    <p id="dry"></p>
  </div>

  <div class="card">
    <h2>Moisture</h2>
    <p id="moisture"></p>
  </div>

</div>

<h2>📊 Live Charts</h2>

<!-- Charts -->
<iframe width="450" height="260"
src="https://thingspeak.com/channels/3339508/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true">
</iframe>

<iframe width="450" height="260"
src="https://thingspeak.com/channels/3339508/charts/2?bgcolor=%23ffffff&color=%2300aaff&dynamic=true">
</iframe>

<iframe width="450" height="260"
src="https://thingspeak.com/channels/3339508/charts/3?bgcolor=%23ffffff&color=%2300cc66&dynamic=true">
</iframe>

<script>
async function getData() {
  let res = await fetch("https://api.thingspeak.com/channels/3339508/feeds/last.json");
  let data = await res.json();

  let wet = parseFloat(data.field1);
  let dry = parseFloat(data.field2);
  let moisture = parseFloat(data.field3);

  document.getElementById("wet").innerHTML =
    wet + " cm " + (wet < 5 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>");

  document.getElementById("dry").innerHTML =
    dry + " cm " + (dry < 5 ? "<span class='full'>FULL 🚨</span>" : "<span class='ok'>OK ✅</span>");

  document.getElementById("moisture").innerHTML =
    moisture + "% " + (moisture > 60 ? "<span class='full'>WET 💧</span>" : "<span class='ok'>DRY 🟡</span>");
}

setInterval(getData, 5000);
getData();
</script>

</body>
</html>
