<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteIQ Smart Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.logo{font-size:24px;font-weight:700;}
.logo span{color:#22c55e;}
.time{font-size:14px;color:#94a3b8;}

/* MAIN */
main{padding:30px;max-width:1200px;margin:auto;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
  transition:.3s;
}
.card:hover{transform:translateY(-6px);}

.value{
  font-size:48px;
  font-weight:700;
  margin-top:10px;
}

.badge{
  margin-top:10px;
  padding:6px 14px;
  border-radius:20px;
  display:inline-block;
}

.ok{background:#22c55e20;color:#22c55e;}
.warn{background:#f59e0b20;color:#f59e0b;}
.danger{background:#ef444420;color:#ef4444;}

/* ALERT */
#alert{
  margin-bottom:20px;
  padding:12px;
  border-radius:10px;
  display:none;
  background:#ef444420;
  color:#ef4444;
  text-align:center;
}
#alert.show{display:block;}

/* CHART */
canvas{
  margin-top:30px;
  background:white;
  border-radius:15px;
  padding:10px;
}

/* TABLE */
table{
  width:100%;
  margin-top:30px;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  text-align:center;
}
th{color:#94a3b8;font-size:12px;}

</style>
</head>

<body>

<header>
  <div class="logo">Waste<span>IQ</span></div>
  <div class="time" id="time">Connecting...</div>
</header>

<main>

<div id="alert"></div>

<div class="grid">
  <div class="card">
    <h3>Dry Waste</h3>
    <div id="dry" class="value">--</div>
    <div id="dryStatus" class="badge ok">Loading</div>
  </div>

  <div class="card">
    <h3>E-Waste</h3>
    <div id="ewaste" class="value">--</div>
    <div id="eStatus" class="badge ok">Loading</div>
  </div>
</div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>#</th><th>Time</th><th>Dry</th><th>E-Waste</th><th>Status</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

</main>

<script>
const API="https://api.thingspeak.com/channels/3339508/feeds.json?results=10";

let dryArr=[], eArr=[], labels=[], logs=[];

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[
{label:"Dry",data:dryArr,borderColor:"#22c55e",tension:.4},
{label:"E-Waste",data:eArr,borderColor:"#f97316",tension:.4}
]}
});

function status(val,el){
  el.className="badge";
  if(val>=80){el.classList.add("danger");el.innerText="FULL";}
  else if(val>=60){el.classList.add("warn");el.innerText="FILLING";}
  else{el.classList.add("ok");el.innerText="OK";}
}

async function load(){
  const res=await fetch(API);
  const data=await res.json();
  const last=data.feeds[data.feeds.length-1];

  let d=parseFloat(last.field1);
  let e=parseFloat(last.field2);

  document.getElementById("dry").innerText=d.toFixed(0)+"%";
  document.getElementById("ewaste").innerText=e.toFixed(0)+"%";

  status(d,dryStatus);
  status(e,eStatus);

  document.getElementById("time").innerText=new Date().toLocaleTimeString();

  // alert
  let msg="";
  if(d>=80)msg+="Dry Full ";
  if(e>=80)msg+="E-Waste Full";
  const a=document.getElementById("alert");
  if(msg){a.innerText=msg;a.classList.add("show");}
  else a.classList.remove("show");

  // chart
  dryArr.push(d); eArr.push(e); labels.push(new Date().toLocaleTimeString());
  if(dryArr.length>10){dryArr.shift();eArr.shift();labels.shift();}
  chart.update();

  // log
  logs.unshift({d,e,t:new Date().toLocaleTimeString()});
  if(logs.length>10)logs.pop();

  log.innerHTML=logs.map((r,i)=>`
  <tr>
    <td>${logs.length-i}</td>
    <td>${r.t}</td>
    <td>${r.d}%</td>
    <td>${r.e}%</td>
    <td>${(r.d>=80||r.e>=80)?"⚠️":"OK"}</td>
  </tr>`).join("");
}

setInterval(load,15000);
load();
</script>

</body>
</html>
