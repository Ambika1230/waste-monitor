<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteIQ Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins';
  background:#0f172a;
  color:white;
  transition:.3s;
}

/* LIGHT MODE */
.light{
  background:#f5f7fa;
  color:#111;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:#020617;
}
nav button{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#22c55e,#0ea5e9);
  text-align:center;
}

/* SECTION */
section{padding:50px;text-align:center}

/* CARDS */
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{
  background:#020617;
  padding:20px;
  border-radius:15px;
  width:250px;
}
.value{font-size:40px;font-weight:bold}

.ok{color:#22c55e}
.warn{color:#f59e0b}
.danger{color:#ef4444}

/* TABLE */
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #1e293b}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  background:#22c55e;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* ALERT POPUP */
#popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#ef4444;
  padding:15px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<nav>
<h2>WasteIQ</h2>
<div>
<button onclick="toggleMode()">🌙</button>
<span id="status">🟢 Live</span>
</div>
</nav>

<div class="hero">
<h1>Smart Waste Monitoring</h1>
<p>Real-time IoT System</p>
</div>

<section>
<h2>Dashboard</h2>

<div class="cards">
<div class="card">
<h3>Dry Waste</h3>
<div id="dry" class="value">--</div>
<div id="dStatus"></div>
</div>

<div class="card">
<h3>E-Waste</h3>
<div id="ewaste" class="value">--</div>
<div id="eStatus"></div>
</div>
</div>

<canvas id="chart"></canvas>

<button class="btn" onclick="downloadCSV()">Download Data</button>
</section>

<section>
<h2>Recent Activity</h2>

<table>
<thead>
<tr><th>#</th><th>Time</th><th>Dry</th><th>E-Waste</th><th>Status</th></tr>
</thead>
<tbody id="log"></tbody>
</table>
</section>

<div id="popup">⚠️ Bin Full!</div>

<script>
const API="https://api.thingspeak.com/channels/3339508/feeds.json?results=10";

let dArr=[],eArr=[],labels=[],logs=[];

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[
{label:"Dry",data:dArr,borderColor:"#22c55e"},
{label:"E-Waste",data:eArr,borderColor:"#f97316"}
]}
});

function status(val,el){
if(val>=80){el.innerHTML="<span class='danger'>FULL</span>"; showPopup();}
else if(val>=60){el.innerHTML="<span class='warn'>FILLING</span>";}
else{el.innerHTML="<span class='ok'>OK</span>";}
}

function showPopup(){
const p=document.getElementById("popup");
p.style.display="block";
setTimeout(()=>p.style.display="none",3000);
}

async function load(){
try{
const res=await fetch(API);
const data=await res.json();
const last=data.feeds[data.feeds.length-1];

let d=parseFloat(last.field1);
let e=parseFloat(last.field2);

dry.innerText=d+"%";
ewaste.innerText=e+"%";

status(d,dStatus);
status(e,eStatus);

/* chart */
dArr.push(d);eArr.push(e);
labels.push(new Date().toLocaleTimeString());
if(dArr.length>10){dArr.shift();eArr.shift();labels.shift();}
chart.update();

/* log */
logs.unshift({d,e,time:new Date().toLocaleTimeString()});
if(logs.length>10)logs.pop();

log.innerHTML=logs.map((r,i)=>`
<tr>
<td>${logs.length-i}</td>
<td>${r.time}</td>
<td>${r.d}%</td>
<td>${r.e}%</td>
<td>${(r.d>=80||r.e>=80)?"⚠️":"OK"}</td>
</tr>`).join("");

}catch{
document.getElementById("status").innerText="🔴 Offline";
}
}

function toggleMode(){
document.body.classList.toggle("light");
}

function downloadCSV(){
let csv="Time,Dry,E-Waste\n";
logs.forEach(r=>{
csv+=`${r.time},${r.d},${r.e}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
}

setInterval(load,15000);
load();
</script>

</body>
</html>
